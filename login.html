<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión - Plan de estudios dinámico</title>
  <link rel="stylesheet" href="styles.css">
  
  </head>
<body style="display: flex; flex-direction: column; min-height: 100vh; margin: 0;">

  <div style="flex: 1;"></div>

  <div class="modal-box" style="text-align: center; width: 90%; max-width: 400px; padding: 40px; margin: 0 auto;">
    <div class="logo" style="margin-bottom: 15px; font-size: 1.5rem;">Plan de estudios <span>dinámico</span></div>
    <h3 style="color: white; margin-bottom: 8px;">¡Hola de nuevo!</h3>
    <p style="color: var(--muted); margin-bottom: 30px; font-size: 0.9rem; line-height: 1.5;">Iniciá sesión para guardar tu progreso en la nube y acceder desde cualquier dispositivo.</p>
    
    <button class="btn-primary" onclick="loginGoogle()" style="display: flex; gap: 10px; align-items: center; justify-content: center; width: 100%; padding: 12px; font-size: 1rem; margin-bottom: 15px;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Continuar con Google
    </button>

    <div style="font-size: 0.75rem; color: var(--muted); border-top: 1px solid var(--border); padding-top: 15px; line-height: 1.4;">
      Para apoyar el mantenimiento de este proyecto gratuito, considerá desactivar tu AdBlock o acceder desde un navegador sin bloqueador de anuncios integrado. 🤍
    </div>
  </div>

  <div style="flex: 1; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 20px; width: 100%;">
    <div style="width: 100%; max-width: 728px; height: 90px; background-color: transparent; display: flex; justify-content: center; align-items: center;">
      </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
